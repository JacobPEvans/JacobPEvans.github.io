<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#393e46"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <pattern id="dot-grid" x="100" y="80" width="100" height="80" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1.5" fill="#00adb5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <!-- Grid dots -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#dot-grid)" opacity="0.12"/>
  <!-- Teal accent line -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#00adb5" stroke-width="1" opacity="0.15"/>
</svg>
