<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <rect width="640" height="320" fill="#1a1e26"/>
  <!-- Neural network: 3 layers -->
  <!-- Input layer -->
  <circle cx="200" cy="100" r="14" fill="#252a34" stroke="#00adb5" stroke-width="2"/>
  <circle cx="200" cy="160" r="14" fill="#252a34" stroke="#00adb5" stroke-width="2"/>
  <circle cx="200" cy="220" r="14" fill="#252a34" stroke="#00adb5" stroke-width="2"/>
  <!-- Hidden layer -->
  <circle cx="320" cy="80"  r="14" fill="#252a34" stroke="#00adb5" stroke-width="2"/>
  <circle cx="320" cy="140" r="14" fill="#00adb5" stroke="#00adb5" stroke-width="2"/>
  <circle cx="320" cy="200" r="14" fill="#252a34" stroke="#00adb5" stroke-width="2"/>
  <circle cx="320" cy="255" r="14" fill="#252a34" stroke="#00adb5" stroke-width="2"/>
  <!-- Output layer -->
  <circle cx="440" cy="120" r="14" fill="#252a34" stroke="#00adb5" stroke-width="2"/>
  <circle cx="440" cy="200" r="14" fill="#252a34" stroke="#00adb5" stroke-width="2"/>
  <!-- Connections input->hidden -->
  <line x1="214" y1="100" x2="306" y2="80"  stroke="#00adb5" stroke-width="1" opacity="0.3"/>
  <line x1="214" y1="100" x2="306" y2="140" stroke="#00adb5" stroke-width="1" opacity="0.6"/>
  <line x1="214" y1="100" x2="306" y2="200" stroke="#00adb5" stroke-width="1" opacity="0.2"/>
  <line x1="214" y1="160" x2="306" y2="80"  stroke="#00adb5" stroke-width="1" opacity="0.2"/>
  <line x1="214" y1="160" x2="306" y2="140" stroke="#00adb5" stroke-width="1" opacity="0.7"/>
  <line x1="214" y1="160" x2="306" y2="200" stroke="#00adb5" stroke-width="1" opacity="0.4"/>
  <line x1="214" y1="160" x2="306" y2="255" stroke="#00adb5" stroke-width="1" opacity="0.2"/>
  <line x1="214" y1="220" x2="306" y2="140" stroke="#00adb5" stroke-width="1" opacity="0.3"/>
  <line x1="214" y1="220" x2="306" y2="200" stroke="#00adb5" stroke-width="1" opacity="0.6"/>
  <line x1="214" y1="220" x2="306" y2="255" stroke="#00adb5" stroke-width="1" opacity="0.4"/>
  <!-- Connections hidden->output -->
  <line x1="334" y1="80"  x2="426" y2="120" stroke="#00adb5" stroke-width="1" opacity="0.4"/>
  <line x1="334" y1="140" x2="426" y2="120" stroke="#00adb5" stroke-width="1.5" opacity="0.8"/>
  <line x1="334" y1="140" x2="426" y2="200" stroke="#00adb5" stroke-width="1" opacity="0.5"/>
  <line x1="334" y1="200" x2="426" y2="120" stroke="#00adb5" stroke-width="1" opacity="0.3"/>
  <line x1="334" y1="200" x2="426" y2="200" stroke="#00adb5" stroke-width="1.5" opacity="0.7"/>
  <line x1="334" y1="255" x2="426" y2="200" stroke="#00adb5" stroke-width="1" opacity="0.4"/>
  <!-- Label -->
  <text x="320" y="295" text-anchor="middle" font-family="monospace" font-size="13" fill="#00adb5" opacity="0.8">claude · gemini · ollama</text>
</svg>
