<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <rect width="640" height="320" fill="#1a1e26"/>
  <!-- Nix snowflake — six arms with forks, simplified -->
  <g transform="translate(320,155)" stroke="#00adb5" stroke-linecap="round">
    <!-- Arm 1: up -->
    <line x1="0" y1="0" x2="0" y2="-70" stroke-width="3"/>
    <line x1="0" y1="-35" x2="-18" y2="-53" stroke-width="2"/>
    <line x1="0" y1="-35" x2="18" y2="-53" stroke-width="2"/>
    <!-- Arm 2: up-right -->
    <line x1="0" y1="0" x2="60" y2="-35" stroke-width="3"/>
    <line x1="30" y1="-17" x2="30" y2="-38" stroke-width="2"/>
    <line x1="30" y1="-17" x2="48" y2="-6" stroke-width="2"/>
    <!-- Arm 3: down-right -->
    <line x1="0" y1="0" x2="60" y2="35" stroke-width="3"/>
    <line x1="30" y1="17" x2="48" y2="6" stroke-width="2"/>
    <line x1="30" y1="17" x2="30" y2="38" stroke-width="2"/>
    <!-- Arm 4: down -->
    <line x1="0" y1="0" x2="0" y2="70" stroke-width="3"/>
    <line x1="0" y1="35" x2="18" y2="53" stroke-width="2"/>
    <line x1="0" y1="35" x2="-18" y2="53" stroke-width="2"/>
    <!-- Arm 5: down-left -->
    <line x1="0" y1="0" x2="-60" y2="35" stroke-width="3"/>
    <line x1="-30" y1="17" x2="-30" y2="38" stroke-width="2"/>
    <line x1="-30" y1="17" x2="-48" y2="6" stroke-width="2"/>
    <!-- Arm 6: up-left -->
    <line x1="0" y1="0" x2="-60" y2="-35" stroke-width="3"/>
    <line x1="-30" y1="-17" x2="-48" y2="-6" stroke-width="2"/>
    <line x1="-30" y1="-17" x2="-30" y2="-38" stroke-width="2"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="7" fill="#00adb5" stroke="none"/>
  </g>
  <!-- Label -->
  <text x="320" y="265" text-anchor="middle" font-family="monospace" font-size="13" fill="#00adb5" opacity="0.8">nix-darwin · nix-home · nix-ai</text>
</svg>
